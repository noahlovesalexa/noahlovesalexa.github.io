<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obsidian - AI</title>
    <link rel="icon" type="image/png" href="obsidian.png">
    <link rel="stylesheet" type="text/css" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* Fix: particles canvas blocks all clicks on this page */
        #particles-js canvas { pointer-events: none !important; }
        /* Ensure AI content sits above the canvas */
        .header, .main-content, .ai-container,
        .ai-header-bar, .ai-messages, .ai-input-bar,
        .ai-suggestion-chip, .ai-send-btn, .ai-textarea,
        .ai-model-select, .ai-clear-btn {
            position: relative;
            z-index: 2;
        }

        /* ── AI page uses the same page-wrapper / main-content structure ── */
        .ai-container {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 140px);
            max-width: 860px;
            margin: 1.5rem auto 0 !important;
            width: 100%;
        }

        /* ── Chat header bar (matches chat.html pattern) ── */
        .ai-header-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem 1rem;
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg) var(--radius-lg) 0 0;
            flex-shrink: 0;
        }
        .ai-header-left {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .ai-header-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
        }
        .ai-status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.2rem 0.6rem;
            border-radius: var(--radius-full);
            background: rgba(var(--primary-rgb), 0.1);
            color: var(--primary);
            font-size: 0.72rem;
            font-weight: 600;
        }
        .ai-status-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--success);
        }
        .ai-header-right {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .ai-model-select {
            background: var(--bg-elevated);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            border-radius: var(--radius-full);
            padding: 0.3rem 0.7rem;
            font-size: 0.75rem;
            font-family: var(--font-sans);
            cursor: pointer;
            outline: none;
            transition: border-color var(--transition-fast);
        }
        .ai-model-select:focus { border-color: var(--primary); }
        .ai-clear-btn {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.3rem 0.7rem;
            border-radius: var(--radius-full);
            background: rgba(var(--primary-rgb), 0.08);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            font-size: 0.75rem;
            font-family: var(--font-sans);
            cursor: pointer;
            transition: all var(--transition-fast);
        }
        .ai-clear-btn:hover {
            background: rgba(var(--primary-rgb), 0.15);
            border-color: var(--primary);
            color: var(--primary);
        }

        /* ── Messages area ── */
        .ai-messages {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0;
            padding: 1rem;
            background: var(--bg-base);
            border-left: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
        }
        .ai-messages::-webkit-scrollbar { display: none; }

        /* ── Empty state ── */
        .ai-empty {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            text-align: center;
            padding: 2rem;
            min-height: 300px;
        }
        .ai-empty-icon {
            width: 60px; height: 60px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
        }
        .ai-empty h3 {
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--text-primary);
            margin: 0;
        }
        .ai-empty p {
            font-size: 0.82rem;
            color: var(--text-muted);
            margin: 0;
            max-width: 340px;
            line-height: 1.6;
        }
        .ai-suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            justify-content: center;
            margin-top: 0.25rem;
        }
        .ai-suggestion-chip {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-full);
            padding: 0.4rem 0.9rem;
            font-size: 0.78rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all var(--transition-fast);
            font-family: var(--font-sans);
        }
        .ai-suggestion-chip:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: rgba(var(--primary-rgb), 0.08);
        }

        /* ── Message rows ── */
        .ai-msg {
            display: flex;
            gap: 0.65rem;
            align-items: flex-start;
            padding: 0.6rem 0;
            animation: msgIn 0.18s ease;
        }
        @keyframes msgIn {
            from { opacity: 0; transform: translateY(5px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .ai-msg.user { flex-direction: row-reverse; }

        .ai-avatar {
            width: 32px; height: 32px;
            border-radius: var(--radius-sm);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }
        .ai-msg.user .ai-avatar {
            background: var(--primary);
            color: #fff;
            box-shadow: 0 2px 8px rgba(var(--primary-rgb), 0.3);
        }
        .ai-msg.assistant .ai-avatar {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--primary);
        }

        .ai-bubble {
            max-width: 76%;
            padding: 0.65rem 0.95rem;
            border-radius: var(--radius-md);
            font-size: 0.875rem;
            line-height: 1.65;
            word-break: break-word;
        }
        .ai-msg.user .ai-bubble {
            background: var(--primary);
            color: #fff;
            border-bottom-right-radius: 4px;
            box-shadow: 0 2px 8px rgba(var(--primary-rgb), 0.25);
        }
        .ai-msg.assistant .ai-bubble {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            border-bottom-left-radius: 4px;
        }

        /* ── Markdown ── */
        .ai-bubble code {
            background: rgba(0,0,0,0.18);
            border-radius: 4px;
            padding: 0.1em 0.35em;
            font-family: var(--font-mono, monospace);
            font-size: 0.82em;
        }
        .ai-msg.assistant .ai-bubble code {
            background: var(--bg-input);
        }
        .ai-code-block {
            position: relative;
            margin: 0.6rem 0;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-color);
            overflow: hidden;
        }
        .ai-code-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.35rem 0.75rem;
            background: rgba(var(--primary-rgb), 0.08);
            border-bottom: 1px solid var(--border-color);
            font-size: 0.72rem;
            font-family: var(--font-mono, monospace);
            color: var(--text-muted);
        }
        .ai-copy-btn {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.2rem 0.55rem;
            border-radius: 5px;
            background: rgba(var(--primary-rgb), 0.1);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            font-size: 0.7rem;
            font-family: var(--font-sans);
            cursor: pointer;
            transition: all var(--transition-fast);
            white-space: nowrap;
        }
        .ai-copy-btn:hover {
            background: rgba(var(--primary-rgb), 0.2);
            border-color: var(--primary);
            color: var(--primary);
        }
        .ai-copy-btn.copied {
            color: var(--success);
            border-color: var(--success);
            background: rgba(34,197,94,0.1);
        }
        .ai-bubble pre {
            background: var(--bg-input);
            padding: 0.75rem;
            overflow-x: auto;
            margin: 0;
            font-size: 0.8rem;
            line-height: 1.5;
        }
        .ai-bubble pre code { background: none; padding: 0; border-radius: 0; }
        .ai-bubble strong { font-weight: 600; }
        .ai-bubble em { font-style: italic; }
        .ai-bubble ul, .ai-bubble ol { padding-left: 1.3rem; margin: 0.35rem 0; }
        .ai-bubble li { margin: 0.15rem 0; }
        .ai-bubble p { margin: 0.35rem 0; }
        .ai-bubble p:first-child { margin-top: 0; }
        .ai-bubble p:last-child { margin-bottom: 0; }
        .ai-bubble h1, .ai-bubble h2, .ai-bubble h3 {
            font-weight: 700; margin: 0.6rem 0 0.25rem; line-height: 1.3;
        }
        .ai-bubble h1 { font-size: 1.1em; }
        .ai-bubble h2 { font-size: 1em; }
        .ai-bubble h3 { font-size: 0.95em; }
        .ai-bubble a { color: var(--primary); text-decoration: underline; }
        .ai-msg.user .ai-bubble a { color: rgba(255,255,255,0.85); }

        /* ── Typing dots ── */
        .ai-typing {
            display: flex;
            gap: 4px;
            align-items: center;
            padding: 0.35rem 0.1rem;
        }
        .ai-typing span {
            width: 7px; height: 7px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: typingDot 1.2s infinite;
        }
        .ai-typing span:nth-child(2) { animation-delay: 0.2s; }
        .ai-typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typingDot {
            0%, 60%, 100% { opacity: 0.25; transform: scale(0.75); }
            30% { opacity: 1; transform: scale(1); }
        }

        /* ── Input bar (matches chat.html pattern) ── */
        .ai-input-bar {
            display: flex;
            align-items: flex-end;
            gap: 0.5rem;
            padding: 0.75rem 1rem;
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-top: none;
            border-radius: 0 0 var(--radius-lg) var(--radius-lg);
            flex-shrink: 0;
        }
        .ai-textarea {
            flex: 1;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-family: var(--font-sans);
            font-size: 0.875rem;
            line-height: 1.5;
            resize: none;
            min-height: 40px;
            max-height: 160px;
            overflow-y: auto;
            padding: 0.55rem 0.85rem;
            outline: none;
            transition: border-color var(--transition-fast);
        }
        .ai-textarea:focus { border-color: var(--primary); }
        .ai-textarea::placeholder { color: var(--text-muted); }
        .ai-textarea::-webkit-scrollbar { display: none; }

        .ai-send-btn {
            width: 40px; height: 40px;
            border-radius: var(--radius-sm);
            background: var(--primary);
            border: none;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: opacity var(--transition-fast), transform 0.1s;
            box-shadow: 0 2px 8px rgba(var(--primary-rgb), 0.3);
        }
        .ai-send-btn:hover { opacity: 0.85; }
        .ai-send-btn:active { transform: scale(0.92); }
        .ai-send-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .ai-send-btn.stop { background: var(--danger); box-shadow: 0 2px 8px rgba(239,68,68,0.3); }

        .ai-hint {
            text-align: center;
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 0.5rem;
            opacity: 0.6;
        }

        /* ── Error ── */
        .ai-error {
            background: rgba(239,68,68,0.08);
            border: 1px solid rgba(239,68,68,0.25);
            color: var(--danger);
            border-radius: var(--radius-sm);
            padding: 0.6rem 0.9rem;
            font-size: 0.82rem;
            margin: 0.4rem 0;
        }

        /* ── Responsive ── */
        @media (max-width: 600px) {
            .ai-container { height: calc(100vh - 100px); }
            .ai-bubble { max-width: 88%; }
            .ai-header-bar { flex-wrap: wrap; gap: 0.5rem; }
        }
    </style>
</head>
<body>
    <script src="theme-init.js"></script>
    <script src="auth-guard.js"></script>

    <header class="header">
        <div class="browser-bar">
            <div class="left-section">
                <img src="obsidian.png" alt="Obsidian" class="logo">
                <a href="main.html" class="app-name"><h1>Obsidian</h1></a>
            </div>
            <nav class="tab-navigation">
                <button class="tab-btn" onclick="window.location.href='main.html'">Games</button>
                <button class="tab-btn" onclick="window.location.href='media.html'">Media</button>
                <button class="tab-btn" onclick="window.location.href='chat.html'">Chat</button>
                <button class="tab-btn active">AI</button>
                <button class="tab-btn" onclick="window.location.href='proxy.html'">Proxy</button>
                <button class="tab-btn" onclick="window.location.href='main.html'">Settings</button>
                <button class="tab-btn" onclick="window.location.href='credits.html'">Credits</button>
            </nav>
        </div>
    </header>

    <div class="main-content" style="padding:0 1.5rem;">
        <div class="ai-container">

            <!-- Header bar -->
            <div class="ai-header-bar">
                <div class="ai-header-left">
                    <div class="ai-header-title">AI Chat</div>
                    <div class="ai-status-badge">
                        <span class="ai-status-dot"></span>
                        Llama 4
                    </div>
                </div>
                <div class="ai-header-right">
                    <select class="ai-model-select" id="model-select">
                        <option value="llama-3.3-70b-versatile">Llama 3.3 70B</option>
                        <option value="llama-3.1-8b-instant">Llama 3.1 8B (fast)</option>
                        <option value="llama3-70b-8192">Llama 3 70B</option>
                        <option value="llama3-8b-8192">Llama 3 8B (fastest)</option>
                        <option value="mixtral-8x7b-32768">Mixtral 8x7B</option>
                        <option value="gemma2-9b-it">Gemma 2 9B</option>
                    </select>
                    <button class="ai-clear-btn" onclick="clearChat()">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M9 6V4h6v2"/></svg>
                        Clear
                    </button>
                </div>
            </div>

            <!-- Messages -->
            <div class="ai-messages" id="messages">
                <div class="ai-empty" id="empty-state">
                    <div class="ai-empty-icon">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                    </div>
                    <h3>Ask me anything</h3>
                    <p>Powered by Groq — free, fast, no sign-in needed.</p>
                    <div class="ai-suggestions">
                        <button class="ai-suggestion-chip" onclick="sendSuggestion(this)">Explain how black holes work</button>
                        <button class="ai-suggestion-chip" onclick="sendSuggestion(this)">Write a Python web scraper</button>
                        <button class="ai-suggestion-chip" onclick="sendSuggestion(this)">What games should I play?</button>
                        <button class="ai-suggestion-chip" onclick="sendSuggestion(this)">Help me debug my code</button>
                        <button class="ai-suggestion-chip" onclick="sendSuggestion(this)">Write a short story</button>
                        <button class="ai-suggestion-chip" onclick="sendSuggestion(this)">Explain quantum computing</button>
                    </div>
                </div>
            </div>

            <!-- Input bar -->
            <div class="ai-input-bar">
                <textarea
                    class="ai-textarea"
                    id="ai-input"
                    placeholder="Message Llama..."
                    rows="1"
                    onkeydown="handleKey(event)"
                    oninput="autoResize(this)"
                ></textarea>
                <button class="ai-send-btn" id="send-btn" onclick="sendMessage()" title="Send">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                </button>
            </div>

        </div>
        <div class="ai-hint">Powered by Groq &mdash; free, no sign-in needed &nbsp;&middot;&nbsp; Shift+Enter for new line</div>
    </div>

    <script src="theme.js"></script>
    <script>
    var conversation = [];
    var isStreaming = false;
    var currentAbort = null;

    function autoResize(el) {
        el.style.height = 'auto';
        el.style.height = Math.min(el.scrollHeight, 160) + 'px';
    }

    function handleKey(e) {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    }

    function scrollToBottom() {
        var m = document.getElementById('messages');
        m.scrollTop = m.scrollHeight;
    }

    function renderMarkdown(text) {
        var s = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        // Code blocks
        s = s.replace(/```([\w]*)\n?([\s\S]*?)```/g, function(_, lang, code) {
            var label = lang || 'code';
            var escaped = code.trim().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
            // Store raw code in data attr for copy (base64 to avoid quote issues)
            var b64 = btoa(unescape(encodeURIComponent(code.trim())));
            return '<div class="ai-code-block">'
                + '<div class="ai-code-header">'
                + '<span>' + label + '</span>'
                + '<button class="ai-copy-btn" onclick="copyCode(this)" data-code="' + b64 + '">'
                + '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>'
                + 'Copy</button>'
                + '</div>'
                + '<pre><code>' + escaped + '</code></pre>'
                + '</div>';
        });
        // Inline code
        s = s.replace(/`([^`\n]+)`/g, '<code>$1</code>');
        // Bold / italic
        s = s.replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>');
        s = s.replace(/__([^_\n]+)__/g, '<strong>$1</strong>');
        s = s.replace(/\*([^*\n]+)\*/g, '<em>$1</em>');
        s = s.replace(/_([^_\n]+)_/g, '<em>$1</em>');
        // Headers
        s = s.replace(/^### (.+)$/gm,'<h3>$1</h3>');
        s = s.replace(/^## (.+)$/gm,'<h2>$1</h2>');
        s = s.replace(/^# (.+)$/gm,'<h1>$1</h1>');
        // Lists
        s = s.replace(/^[*\-] (.+)$/gm,'<li>$1</li>');
        s = s.replace(/^\d+\. (.+)$/gm,'<li>$1</li>');
        s = s.replace(/(<li>[\s\S]+?<\/li>)/g, '<ul>$1</ul>');
        // Paragraphs
        s = s.replace(/\n\n+/g,'</p><p>');
        s = '<p>' + s + '</p>';
        s = s.replace(/\n/g,'<br>');
        s = s.replace(/<p>\s*<\/p>/g,'');
        s = s.replace(/<p>(<(?:pre|ul|h[123])>)/g,'$1');
        s = s.replace(/(<\/(?:pre|ul|h[123])>)<\/p>/g,'$1');
        return s;
    }

    function escapeHtml(str) {
        return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
    }

    function appendMessage(role, content, streaming) {
        var empty = document.getElementById('empty-state');
        if (empty) empty.remove();
        var msgs = document.getElementById('messages');
        var wrap = document.createElement('div');
        wrap.className = 'ai-msg ' + role;
        var avatarHtml = role === 'assistant'
            ? '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>'
            : 'You';
        var bubbleHtml = role === 'assistant'
            ? (streaming ? '<div class="ai-typing"><span></span><span></span><span></span></div>' : renderMarkdown(content))
            : escapeHtml(content);
        wrap.innerHTML = '<div class="ai-avatar">' + avatarHtml + '</div><div class="ai-bubble">' + bubbleHtml + '</div>';
        msgs.appendChild(wrap);
        scrollToBottom();
        return wrap.querySelector('.ai-bubble');
    }

    function showError(msg) {
        var msgs = document.getElementById('messages');
        var d = document.createElement('div');
        d.className = 'ai-error';
        d.textContent = msg;
        msgs.appendChild(d);
        scrollToBottom();
    }

    function sendSuggestion(btn) {
        document.getElementById('ai-input').value = btn.textContent;
        sendMessage();
    }

    async function sendMessage() {
        if (isStreaming) { if (currentAbort) currentAbort(); return; }
        var input = document.getElementById('ai-input');
        var text = input.value.trim();
        if (!text) return;
        var model = document.getElementById('model-select').value;
        input.value = ''; input.style.height = 'auto';
        conversation.push({ role: 'user', content: text });
        appendMessage('user', text);
        var bubble = appendMessage('assistant', '', true);
        var btn = document.getElementById('send-btn');
        btn.classList.add('stop'); btn.title = 'Stop';
        btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>';
        isStreaming = true;
        var fullText = '', stopped = false;
        currentAbort = function() { stopped = true; };
        try {
            var messages = conversation.slice(-20).map(function(m){ return { role: m.role, content: m.content }; });
            var backendUrl = (typeof OBSIDIAN_BACKEND_URL !== 'undefined' ? OBSIDIAN_BACKEND_URL : 'https://lettuce-cola-resource.ngrok-free.dev');
            var resp = await fetch(backendUrl + '/api/ai/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': '1' },
                body: JSON.stringify({ messages: messages, model: model, stream: true })
            });
            if (!resp.ok) {
                var errData = await resp.json().catch(function(){ return {}; });
                throw new Error(errData.error || ('HTTP ' + resp.status));
            }
            var reader = resp.body.getReader();
            var decoder = new TextDecoder();
            var buffer = '';
            while (true) {
                if (stopped) { reader.cancel(); break; }
                var _ref = await reader.read();
                var done = _ref.done; var value = _ref.value;
                if (done) break;
                buffer += decoder.decode(value, { stream: true });
                var lines = buffer.split('\n');
                buffer = lines.pop();
                for (var li = 0; li < lines.length; li++) {
                    var line = lines[li].trim();
                    if (!line || line === 'data: [DONE]') continue;
                    if (line.startsWith('data: ')) {
                        try {
                            var chunk = JSON.parse(line.slice(6));
                            var delta = chunk.choices && chunk.choices[0] && chunk.choices[0].delta && chunk.choices[0].delta.content;
                            if (delta) {
                                fullText += delta;
                                bubble.innerHTML = renderMarkdown(fullText);
                                scrollToBottom();
                            }
                        } catch(pe) {}
                    }
                }
            }
            if (!stopped) {
                conversation.push({ role: 'assistant', content: fullText });
            } else {
                if (fullText) conversation.push({ role: 'assistant', content: fullText });
                else bubble.innerHTML = '<em style="color:var(--text-muted)">Stopped.</em>';
            }
        } catch(err) {
            bubble.remove(); conversation.pop();
            var msg = err && err.message ? err.message : String(err);
            showError('Error: ' + msg);
        }
        isStreaming = false; currentAbort = null;
        btn.classList.remove('stop'); btn.title = 'Send';
        btn.innerHTML = '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>';
    }

    function copyCode(btn) {
        try {
            var code = decodeURIComponent(escape(atob(btn.dataset.code)));
            navigator.clipboard.writeText(code).then(function() {
                btn.classList.add('copied');
                btn.innerHTML = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>Copied!';
                setTimeout(function() {
                    btn.classList.remove('copied');
                    btn.innerHTML = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>Copy';
                }, 2000);
            }).catch(function() {
                // Fallback for browsers without clipboard API
                var ta = document.createElement('textarea');
                ta.value = code;
                ta.style.cssText = 'position:fixed;opacity:0';
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                btn.classList.add('copied');
                btn.innerHTML = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>Copied!';
                setTimeout(function() {
                    btn.classList.remove('copied');
                    btn.innerHTML = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>Copy';
                }, 2000);
            });
        } catch(e) {}
    }

    function clearChat() {
        conversation = [];
        var msgs = document.getElementById('messages');
        msgs.innerHTML = '';
        var empty = document.createElement('div');
        empty.className = 'ai-empty'; empty.id = 'empty-state';
        empty.innerHTML = '<div class="ai-empty-icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div>'
            + '<h3>Ask me anything</h3>'
            + '<p>Powered by Groq — free, fast, no sign-in needed.</p>'
            + '<div class="ai-suggestions">'
            + '<button class="ai-suggestion-chip" onclick="sendSuggestion(this)">Explain how black holes work</button>'
            + '<button class="ai-suggestion-chip" onclick="sendSuggestion(this)">Write a Python web scraper</button>'
            + '<button class="ai-suggestion-chip" onclick="sendSuggestion(this)">What games should I play?</button>'
            + '<button class="ai-suggestion-chip" onclick="sendSuggestion(this)">Help me debug my code</button>'
            + '<button class="ai-suggestion-chip" onclick="sendSuggestion(this)">Write a short story</button>'
            + '<button class="ai-suggestion-chip" onclick="sendSuggestion(this)">Explain quantum computing</button>'
            + '</div>';
        msgs.appendChild(empty);
    }
    </script>
