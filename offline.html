<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obsidian - Offline</title>
    <link rel="icon" type="image/png" href="obsidian.png">
    <link rel="stylesheet" type="text/css" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .offline-wave {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 200px;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .offline-wave svg {
            position: absolute;
            bottom: 0;
            width: 200%;
            height: 100%;
            animation: waveSlide 12s linear infinite;
        }
        @keyframes waveSlide {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .signal-icon {
            position: relative;
            width: 80px;
            height: 80px;
            margin: 0 auto 1.5rem;
        }
        .signal-bar {
            position: absolute;
            bottom: 0;
            background: var(--border-color);
            border-radius: 3px 3px 0 0;
            transition: background 0.3s ease;
        }
        .signal-bar:nth-child(1) { left: 8px; width: 12px; height: 20px; }
        .signal-bar:nth-child(2) { left: 24px; width: 12px; height: 35px; }
        .signal-bar:nth-child(3) { left: 40px; width: 12px; height: 50px; }
        .signal-bar:nth-child(4) { left: 56px; width: 12px; height: 65px; }
        .signal-x {
            position: absolute;
            top: 0;
            right: -5px;
            color: var(--danger);
            font-size: 1.5rem;
            font-weight: 700;
            animation: floatBounce 2s ease-in-out infinite;
        }
        .retry-spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        .btn.retrying .retry-spinner { display: inline-block; }
        .btn.retrying .retry-text { display: none; }
        .pulse-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 120px;
            height: 120px;
            margin: -60px 0 0 -60px;
            border: 2px solid rgba(var(--primary-rgb), 0.2);
            border-radius: 50%;
            animation: pulseRing 2s ease-out infinite;
            pointer-events: none;
        }
        @keyframes pulseRing {
            0% { transform: scale(0.8); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>
    <script src="theme-init.js"></script>

    <!-- Animated wave background -->
    <div class="offline-wave">
        <svg viewBox="0 0 1440 200" xmlns="http://www.w3.org/2000/svg">
            <path fill="rgba(139,92,246,0.03)" d="M0,100 C360,160 720,40 1080,100 C1260,130 1380,80 1440,100 L1440,200 L0,200 Z"/>
            <path fill="rgba(139,92,246,0.02)" d="M0,140 C240,100 480,180 720,140 C960,100 1200,160 1440,140 L1440,200 L0,200 Z"/>
        </svg>
    </div>

    <div class="center-page" style="position:relative; z-index:1;">
        <div class="status-card">
            <div style="position:relative; display:inline-block;">
                <div class="signal-icon">
                    <div class="signal-bar"></div>
                    <div class="signal-bar"></div>
                    <div class="signal-bar"></div>
                    <div class="signal-bar"></div>
                    <div class="signal-x">X</div>
                </div>
                <div class="pulse-ring"></div>
            </div>

            <h1 class="status-title">You're Offline</h1>
            <p class="status-desc">
                It looks like you've lost your internet connection. Check your network settings and try again.
            </p>

            <div class="status-actions">
                <button class="btn btn-primary btn-lg" id="retry-btn" onclick="retryConnection()">
                    <div class="retry-spinner"></div>
                    <span class="retry-text">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
                        Try Again
                    </span>
                </button>
                <a href="main.html" class="btn btn-secondary btn-lg">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                    Go Home
                </a>
            </div>

            <div id="retry-status" style="margin-top:1.25rem; font-size:0.85rem; color:var(--text-muted); display:none;"></div>
        </div>
    </div>

    <script src="theme.js"></script>
    <script>
        function retryConnection() {
            const btn = document.getElementById('retry-btn');
            const status = document.getElementById('retry-status');

            btn.classList.add('retrying');
            btn.disabled = true;
            status.style.display = 'block';
            status.textContent = 'Checking connection...';
            status.style.color = 'var(--text-muted)';

            // Try to fetch a small resource to check connectivity
            fetch('https://www.google.com/favicon.ico', { mode: 'no-cors', cache: 'no-store' })
                .then(() => {
                    status.textContent = 'Connection restored! Redirecting...';
                    status.style.color = 'var(--success)';
                    setTimeout(() => {
                        window.location.href = 'main.html';
                    }, 1000);
                })
                .catch(() => {
                    status.textContent = 'Still offline. Please check your connection.';
                    status.style.color = 'var(--danger)';
                    btn.classList.remove('retrying');
                    btn.disabled = false;
                });
        }

        // Auto-detect when back online
        window.addEventListener('online', () => {
            document.getElementById('retry-status').style.display = 'block';
            document.getElementById('retry-status').textContent = 'Connection detected! Redirecting...';
            document.getElementById('retry-status').style.color = 'var(--success)';
            setTimeout(() => window.location.href = 'main.html', 1000);
        });
    </script>
</body>
</html>
