<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obsidian - Maintenance</title>
    <link rel="icon" type="image/png" href="obsidian.png">
    <link rel="stylesheet" type="text/css" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .maintenance-particles {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .maintenance-particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: var(--primary);
            border-radius: 50%;
            opacity: 0.3;
            animation: mParticleDrift 8s linear infinite;
        }
        @keyframes mParticleDrift {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 0.4; }
            90% { opacity: 0.4; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }

        .maintenance-bg-glow {
            position: fixed;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.08;
            pointer-events: none;
            z-index: 0;
        }
        .maintenance-bg-glow--1 {
            top: -100px;
            right: -100px;
            background: var(--primary);
            animation: mGlowFloat 8s ease-in-out infinite;
        }
        .maintenance-bg-glow--2 {
            bottom: -150px;
            left: -100px;
            background: var(--accent);
            animation: mGlowFloat 10s ease-in-out infinite reverse;
        }
        @keyframes mGlowFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, -20px) scale(1.1); }
        }

        .maintenance-icon-ring {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 0 auto 1.75rem;
        }
        .maintenance-icon-ring__circle {
            position: absolute;
            inset: 0;
            border: 2px solid var(--border-color);
            border-radius: 50%;
            animation: mSpinRing 8s linear infinite;
        }
        .maintenance-icon-ring__circle::after {
            content: '';
            position: absolute;
            top: -4px;
            left: 50%;
            margin-left: -4px;
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
            box-shadow: 0 0 12px rgba(var(--primary-rgb), 0.6);
        }
        .maintenance-icon-ring__inner {
            position: absolute;
            inset: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-elevated);
            border-radius: 50%;
            border: 1px solid var(--border-color);
        }
        @keyframes mSpinRing {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .maintenance-gear {
            animation: mGearSpin 4s linear infinite;
        }
        @keyframes mGearSpin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .maintenance-title {
            font-size: 1.75rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        .maintenance-pulse {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.4rem 1rem;
            background: rgba(var(--primary-rgb), 0.1);
            border: 1px solid rgba(var(--primary-rgb), 0.2);
            border-radius: var(--radius-full);
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--primary);
            margin-top: 1.5rem;
            letter-spacing: 0.03em;
        }
        .maintenance-pulse-dot {
            width: 6px;
            height: 6px;
            background: var(--primary);
            border-radius: 50%;
            animation: mPulseDot 1.5s ease-in-out infinite;
        }
        @keyframes mPulseDot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.7); }
        }
    </style>
</head>
<body>
    <script src="theme-init.js"></script>

    <!-- Floating particles -->
    <div class="maintenance-particles" id="particles"></div>

    <!-- Background glows -->
    <div class="maintenance-bg-glow maintenance-bg-glow--1"></div>
    <div class="maintenance-bg-glow maintenance-bg-glow--2"></div>

    <div class="center-page" style="position:relative; z-index:1;">
        <div class="status-card animate-fade-in">
            <div class="maintenance-icon-ring">
                <div class="maintenance-icon-ring__circle"></div>
                <div class="maintenance-icon-ring__inner">
                    <svg class="maintenance-gear" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3"/>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                    </svg>
                </div>
            </div>

            <h1 class="maintenance-title">Maintenance Mode</h1>
            <p class="status-desc">
                Obsidian is currently undergoing maintenance. We'll be back shortly.
            </p>
            <p style="font-size: 0.85rem; color: var(--text-muted); line-height: 1.6; margin-bottom: 0;">
                Please check back in a few minutes. If this persists, contact the site administrator.
            </p>

            <div class="maintenance-pulse">
                <span class="maintenance-pulse-dot"></span>
                Maintenance in progress
            </div>
        </div>
    </div>

    <script src="theme.js"></script>
    <script>
        // Generate floating particles
        var particleContainer = document.getElementById('particles');
        for (var i = 0; i < 30; i++) {
            var p = document.createElement('div');
            p.className = 'maintenance-particle';
            p.style.left = Math.random() * 100 + '%';
            p.style.animationDelay = Math.random() * 8 + 's';
            p.style.animationDuration = (6 + Math.random() * 6) + 's';
            p.style.width = p.style.height = (1 + Math.random() * 3) + 'px';
            particleContainer.appendChild(p);
        }

        // Listen for maintenance mode being lifted
        window.addEventListener('storage', function(e) {
            if (e.key === 'obsidian_admin_settings') {
                try {
                    var adminS = JSON.parse(e.newValue || '{}');
                    if (!adminS.maintenanceMode) {
                        window.location.href = 'main.html';
                    }
                } catch(err) {}
            }
        });

        // Also poll the admin settings periodically in case storage events don't fire
        setInterval(function() {
            try {
                var adminS = JSON.parse(localStorage.getItem('obsidian_admin_settings') || '{}');
                if (!adminS.maintenanceMode) {
                    window.location.href = 'main.html';
                }
            } catch(e) {}
        }, 5000);
    </script>
</body>
</html>
