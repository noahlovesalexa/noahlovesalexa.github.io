<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Credits and acknowledgements for the Obsidian educational gaming platform">
    <meta property="og:title" content="Obsidian - Credits">
    <meta property="og:description" content="Credits and acknowledgements for the Obsidian educational gaming platform">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Obsidian">
    <title>Obsidian - Credits</title>
    <link rel="icon" type="image/png" href="obsidian.png">
    <link rel="stylesheet" type="text/css" href="styles.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"></noscript>
</head>
<body>
    <script src="theme-init.js"></script>

    <div class="page-wrapper">
        <header class="header animate-fade-in">
            <div class="browser-bar">
                <div class="left-section">
                    <img src="obsidian.png" alt="Obsidian Logo" class="logo">
                    <a href="#" class="app-name" onclick="event.preventDefault(); sessionStorage.setItem('obsidian_show_welcome','true'); window.location.href='main.html';"><h1>Obsidian</h1></a>
                </div>
                <nav class="tab-navigation">
                    <button class="tab-btn" data-tab="games" onclick="window.location.href='main.html'">Games</button>
                    <button class="tab-btn" data-tab="media" onclick="window.location.href='media.html'">Media</button>
                    <button class="tab-btn" data-tab="proxy" onclick="window.location.href='proxy.html'">Proxy</button>
                    <button class="tab-btn" data-tab="chat" onclick="window.location.href='chat.html'">Chat</button>
                    <button class="tab-btn" data-tab="ai" onclick="window.location.href='ai.html'">AI</button>
                    <button class="tab-btn" data-tab="settings" onclick="window.location.href='settings.html'">Settings</button>
                    <button class="tab-btn active" data-tab="credits">Credits</button>
                </nav>
            </div>
        </header>

        <main class="main-content">
            <div class="settings-container animate-slide-up">
                <h2 class="settings-title">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    Credits
                </h2>

                <!-- Version Info -->
                <div class="settings-section animate-slide-up stagger-1">
                    <h3>
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
                        About Obsidian
                    </h3>
                    <p class="section-description">Over 800 hours spent making this. Coded entirely by one person.</p>
                    <div style="display:flex; flex-wrap:wrap; gap:0.75rem; margin-top:0.75rem;">
                        <span style="display:inline-flex; align-items:center; gap:0.4rem; padding:0.35rem 0.75rem; border-radius:8px; background:rgba(139,92,246,0.15); color:var(--accent-primary); font-size:0.8rem; font-weight:600; border:1px solid rgba(139,92,246,0.25);">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
                            v1.8.2
                        </span>
                        <span style="display:inline-flex; align-items:center; gap:0.4rem; padding:0.35rem 0.75rem; border-radius:8px; background:rgba(16,185,129,0.12); color:#10b981; font-size:0.8rem; font-weight:600; border:1px solid rgba(16,185,129,0.25);">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
                            Stable
                        </span>
                    </div>
                </div>

                <!-- Developer -->
                <div class="settings-section animate-slide-up stagger-2">
                    <h3>
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                        Development
                    </h3>
                    <div class="credits-author-card">
                        <div class="credits-avatar">A</div>
                        <div>
                            <div class="credits-author-name">anonymous</div>
                            <div class="credits-author-role">Creator &amp; Developer</div>
                        </div>
                    </div>
                </div>



            </div>
        </main>

        <footer class="watermark">
            <p>made by anonymous</p>
        </footer>
    </div>

    <script src="theme.js"></script>
</body>
</html>
