<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Obsidian</title>
    <link rel="icon" type="image/png" href="obsidian.png">
    <link rel="stylesheet" type="text/css" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .error-page {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }

        .error-bg-glow {
            position: fixed;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.08;
            pointer-events: none;
            z-index: 0;
        }
        .error-bg-glow--1 {
            top: -100px;
            right: -100px;
            background: var(--primary);
            animation: floatGlow 8s ease-in-out infinite;
        }
        .error-bg-glow--2 {
            bottom: -150px;
            left: -100px;
            background: var(--accent);
            animation: floatGlow 10s ease-in-out infinite reverse;
        }

        @keyframes floatGlow {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, -20px) scale(1.1); }
        }

        .error-card {
            position: relative;
            z-index: 1;
            max-width: 480px;
            width: 100%;
            text-align: center;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-xl);
            padding: 3rem 2.5rem;
            box-shadow: var(--shadow-lg);
        }

        .error-icon-ring {
            position: relative;
            width: 88px;
            height: 88px;
            margin: 0 auto 1.75rem;
        }
        .error-icon-ring__circle {
            position: absolute;
            inset: 0;
            border: 2px solid var(--border-color);
            border-radius: 50%;
            animation: spinRing 8s linear infinite;
        }
        .error-icon-ring__circle::after {
            content: '';
            position: absolute;
            top: -4px;
            left: 50%;
            margin-left: -4px;
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
            box-shadow: 0 0 12px rgba(var(--primary-rgb), 0.6);
        }
        .error-icon-ring__inner {
            position: absolute;
            inset: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-elevated);
            border-radius: 50%;
            border: 1px solid var(--border-color);
        }

        @keyframes spinRing {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .error-code {
            font-size: 4.5rem;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -2px;
        }

        .error-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .error-desc {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 2rem;
            max-width: 360px;
            margin-left: auto;
            margin-right: auto;
        }

        .error-actions {
            display: flex;
            gap: 0.75rem;
            justify-content: center;
            margin-bottom: 1.75rem;
        }
        .error-actions .btn {
            min-width: 130px;
        }

        .error-divider {
            height: 1px;
            background: var(--border-color);
            margin-bottom: 1.5rem;
        }

        .error-links-label {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            margin-bottom: 0.75rem;
        }

        .error-links {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .error-link {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.65rem 1rem;
            background: var(--bg-elevated);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all var(--transition-fast);
        }
        .error-link:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: var(--bg-card-hover);
            transform: translateX(4px);
        }
        .error-link svg {
            flex-shrink: 0;
            opacity: 0.5;
            transition: opacity var(--transition-fast);
        }
        .error-link:hover svg {
            opacity: 1;
            color: var(--primary);
        }
    </style>
</head>
<body>
    <script src="theme-init.js"></script>

    <div class="error-page">
        <div class="error-bg-glow error-bg-glow--1"></div>
        <div class="error-bg-glow error-bg-glow--2"></div>

        <div class="error-card animate-fade-in">
            <div class="error-icon-ring">
                <div class="error-icon-ring__circle"></div>
                <div class="error-icon-ring__inner">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="12" y1="8" x2="12" y2="12"/>
                        <line x1="12" y1="16" x2="12.01" y2="16"/>
                    </svg>
                </div>
            </div>

            <div class="error-code">404</div>
            <h1 class="error-title">Page Not Found</h1>
            <p class="error-desc">The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>

            <div class="error-actions">
                <a href="main.html" class="btn btn-primary">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                    Go Home
                </a>
                <button class="btn btn-secondary" onclick="history.back()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                    Go Back
                </button>
            </div>

            <div class="error-divider"></div>
            <div class="error-links-label">Quick Navigation</div>
            <div class="error-links">
                <a href="main.html" class="error-link">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
                    Games Library
                </a>
                <a href="settings.html" class="error-link">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4"/></svg>
                    Settings
                </a>
                <a href="media.html" class="error-link">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                    Media Library
                </a>
            </div>
        </div>
    </div>

    <script src="theme.js"></script>
</body>
</html>
